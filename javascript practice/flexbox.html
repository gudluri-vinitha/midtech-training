<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* mobile */
       @media  (max-width: 400px){
            .container1{
        flex-direction: column;
        align-items: center;
    }

    .flex{
        width:90%;
    }


       }
        
       /* tablet*/
       @media (max-width:768px) {
            .container1{
        justify-content: center;
    }

    .flex{
        width:45%;
    }

        
       }
     

        .container1{
            flex-wrap: wrap;
            flex-shrink: 2;
            justify-content: space-between;
            display: flex;
            padding: 20px;
            border: 3px solid green;
            background-color: aqua;
            margin: 30px;
        }

        .flex{
            display: flex;
     flex-wrap: wrap;
     align-content: center;
            justify-content: center;
            border: 5px solid black;
            background-color: blue;
            height: 100px;
            width: 100px;
            color: white;
            font-size: 15px;
            padding: 20px;
            word-spacing: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>1 july 2026  media queries </h3>
    <div class="container1">
        <div class="flex"><h2>HTML</h2></div>
        <div class="flex"><h2>CSS</h2></div>
        <div class="flex"><h2>JAVASCRIPT</h2></div>
        <div class="flex"><h2>REACTJS</h2></div>

    </div>
</body>
</html>
